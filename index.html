<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sistema de Agendamentos</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; padding: 30px 20px; color: white; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .schedule-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }
        .schedule-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .schedule-card .datetime { color: #667eea; font-weight: 600; margin: 10px 0; }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        .btn-delete {
            background: #dc3545;
            margin-top: 10px;
            padding: 8px 15px;
            font-size: 0.9rem;
        }
        .btn-delete:hover { background: #c82333; }
        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✂️ Meus Agendamentos</h1>
        <p>Agende seus horários de forma rápida e prática</p>
    </div>
    <div id="app"></div>
</div>

<script>
// ==================== CONFIGURAÇÃO FIREBASE (MESMA DO ADMIN) ====================
const firebaseConfig = {
    apiKey: "AIzaSyAZvfBg_FNdmifOPJH1ZY6ZWyXvaXIbJkY",
    authDomain: "banco-de88a.firebaseapp.com",
    projectId: "banco-de88a",
    storageBucket: "banco-de88a.firebasestorage.app",
    messagingSenderId: "742161187025",
    appId: "1:742161187025:web:8803bccbafe96e7422c5f0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==================== PEGAR ID DO CLIENTE PELA URL ====================
const urlParams = new URLSearchParams(window.location.search);
const CLIENTE_ID = urlParams.get('id');

// Se não tiver ID, mostra erro
if (!CLIENTE_ID) {
    document.getElementById('app').innerHTML = `
        <div class="card">
            <div class="alert alert-error" style="background:#f8d7da;color:#721c24;">
                ❌ Erro: ID do cliente não informado na URL.<br>
                Exemplo de uso correto: <strong>?id=cliente_joao_123</strong>
            </div>
        </div>
    `;
} else {
    init();
}

// ==================== FUNÇÕES PRINCIPAIS ====================
let clientData = null;

async function init() {
    await loadClientData();
    renderApp();
    loadSchedules();
}

async function loadClientData() {
    try {
        const doc = await db.collection('sistemas_ativos').doc(CLIENTE_ID).get();
        if (doc.exists) {
            clientData = doc.data();
            document.title = `${clientData.nome || 'Meu Salão'} - Agendamentos`;
        } else {
            // Criar documento padrão se não existir
            clientData = {
                nome: 'Meu Negócio',
                plano: 'basico',
                horarios_disponiveis: [],
                config: { cor_primaria: '#667eea', whatsapp: '' }
            };
            await db.collection('sistemas_ativos').doc(CLIENTE_ID).set(clientData);
        }
        return true;
    } catch (error) {
        console.error('Erro:', error);
        return false;
    }
}

function renderApp() {
    const appDiv = document.getElementById('app');
    appDiv.innerHTML = `
        <div class="card">
            <h2>📅 Novo Agendamento</h2>
            <form id="scheduleForm">
                <div class="form-group">
                    <label>Seu nome *</label>
                    <input type="text" id="clientName" required placeholder="Digite seu nome completo">
                </div>
                <div class="form-group">
                    <label>WhatsApp *</label>
                    <input type="tel" id="clientPhone" required placeholder="(DDD) 9XXXX-XXXX">
                </div>
                <div class="form-group">
                    <label>Serviço *</label>
                    <select id="service" required>
                        <option value="">Selecione um serviço</option>
                        <option value="Corte de Cabelo">✂️ Corte de Cabelo - R$ 40,00</option>
                        <option value="Barba">🧔 Barba - R$ 25,00</option>
                        <option value="Corte + Barba">✨ Corte + Barba - R$ 60,00</option>
                        <option value="Platinado">⭐ Platinado - R$ 120,00</option>
                        <option value="Sobrancelha">👁️ Sobrancelha - R$ 15,00</option>
                        <option value="Hidratação">💧 Hidratação - R$ 50,00</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Data e Horário *</label>
                    <input type="datetime-local" id="datetime" required>
                </div>
                <div class="form-group">
                    <label>Observações (opcional)</label>
                    <textarea id="notes" rows="3" placeholder="Alguma observação? Ex: prefiro horário tal..."></textarea>
                </div>
                <button type="submit">✅ Confirmar Agendamento</button>
            </form>
        </div>
        <div class="card">
            <h2>📋 Meus Agendamentos</h2>
            <div id="schedulesList"><p style="text-align:center;">Carregando...</p></div>
        </div>
    `;
    document.getElementById('scheduleForm').addEventListener('submit', createSchedule);
}

async function createSchedule(e) {
    e.preventDefault();
    
    const clientName = document.getElementById('clientName').value.trim();
    const clientPhone = document.getElementById('clientPhone').value.trim();
    const service = document.getElementById('service').value;
    const datetime = document.getElementById('datetime').value;
    const notes = document.getElementById('notes').value;

    if (!clientName || !clientPhone || !service || !datetime) {
        showAlert('Preencha todos os campos obrigatórios!', 'error');
        return;
    }

    // Validar telefone
    const phoneClean = clientPhone.replace(/\D/g, '');
    if (phoneClean.length < 10) {
        showAlert('WhatsApp inválido! Use DDD + número.', 'error');
        return;
    }

    // Validar data futura
    const selectedDate = new Date(datetime);
    if (selectedDate < new Date()) {
        showAlert('Não é possível agendar no passado!', 'error');
        return;
    }

    const scheduleId = Date.now().toString();
    const scheduleData = {
        id: scheduleId,
        clientName,
        clientPhone: phoneClean,
        service,
        datetime: firebase.firestore.Timestamp.fromDate(selectedDate),
        datetimeStr: selectedDate.toLocaleString('pt-BR'),
        notes: notes || '',
        status: 'pending',
        createdAt: firebase.firestore.Timestamp.now(),
        clienteId: CLIENTE_ID
    };

    try {
        await db.collection('sistemas_ativos').doc(CLIENTE_ID)
            .collection('agendamentos').doc(scheduleId).set(scheduleData);
        
        showAlert('✅ Agendamento realizado com sucesso!', 'success');
        document.getElementById('scheduleForm').reset();
        loadSchedules();
        
        // Enviar confirmação WhatsApp
        sendWhatsAppConfirmation(clientName, service, selectedDate.toLocaleString('pt-BR'), phoneClean);
        
    } catch (error) {
        console.error('Erro:', error);
        showAlert('Erro ao criar agendamento. Tente novamente.', 'error');
    }
}

async function loadSchedules() {
    try {
        const snapshot = await db.collection('sistemas_ativos').doc(CLIENTE_ID)
            .collection('agendamentos')
            .orderBy('datetime', 'asc')
            .get();
        
        const schedulesDiv = document.getElementById('schedulesList');
        
        if (snapshot.empty) {
            schedulesDiv.innerHTML = '<div class="empty-state">📭 Nenhum agendamento encontrado</div>';
            return;
        }

        let html = '<div class="schedule-grid">';
        snapshot.forEach(doc => {
            const s = doc.data();
            const statusClass = s.status === 'confirmed' ? 'status-confirmed' : 
                              s.status === 'cancelled' ? 'status-cancelled' : 'status-pending';
            const statusText = s.status === 'confirmed' ? '✅ Confirmado' :
                              s.status === 'cancelled' ? '❌ Cancelado' : '⏳ Pendente';
            
            // Só mostra cancelar se não estiver cancelado e se for do cliente atual
            const showCancel = s.status !== 'cancelled';
            
            html += `
                <div class="schedule-card">
                    <h4>${escapeHtml(s.service)}</h4>
                    <div class="datetime">📅 ${escapeHtml(s.datetimeStr)}</div>
                    <p><strong>👤 Cliente:</strong> ${escapeHtml(s.clientName)}</p>
                    ${s.notes ? `<p><strong>📝 Obs:</strong> ${escapeHtml(s.notes)}</p>` : ''}
                    <p><span class="status ${statusClass}">${statusText}</span></p>
                    ${showCancel ? `<button class="btn-delete" onclick="cancelSchedule('${s.id}')">❌ Cancelar</button>` : ''}
                </div>
            `;
        });
        html += '</div>';
        schedulesDiv.innerHTML = html;
    } catch (error) {
        console.error('Erro:', error);
        document.getElementById('schedulesList').innerHTML = '<div class="empty-state">❌ Erro ao carregar agendamentos</div>';
    }
}

window.cancelSchedule = async function(scheduleId) {
    if (!confirm('Tem certeza que deseja cancelar este agendamento?')) return;
    
    try {
        await db.collection('sistemas_ativos').doc(CLIENTE_ID)
            .collection('agendamentos').doc(scheduleId).update({
                status: 'cancelled',
                cancelledAt: firebase.firestore.Timestamp.now()
            });
        
        showAlert('✅ Agendamento cancelado com sucesso!', 'success');
        loadSchedules();
    } catch (error) {
        console.error('Erro:', error);
        showAlert('Erro ao cancelar agendamento.', 'error');
    }
};

function sendWhatsAppConfirmation(name, service, datetime, phone) {
    const message = `Olá ${name}! Seu agendamento foi confirmado:

✂️ Serviço: ${service}
📅 Data/Hora: ${datetime}

Estamos aguardando você! 🎉

Caso precise cancelar ou remarcar, entre em contato.`;
    
    const encodedMessage = encodeURIComponent(message);
    const whatsappLink = `https://wa.me/55${phone}?text=${encodedMessage}`;
    
    // Abre o WhatsApp em nova aba (não força envio automático)
    setTimeout(() => {
        if (confirm('Deseja receber a confirmação por WhatsApp?')) {
            window.open(whatsappLink, '_blank');
        }
    }, 500);
}

function showAlert(message, type) {
    const appDiv = document.getElementById('app');
    const alertDiv = document.createElement('div');
    alertDiv.className = `alert alert-${type}`;
    alertDiv.textContent = message;
    
    const oldAlerts = document.querySelectorAll('.alert');
    oldAlerts.forEach(alert => alert.remove());
    
    const firstCard = document.querySelector('.card');
    if (firstCard) {
        firstCard.parentNode.insertBefore(alertDiv, firstCard);
    } else {
        appDiv.insertBefore(alertDiv, appDiv.firstChild);
    }
    
    setTimeout(() => alertDiv.remove(), 5000);
}

function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

console.log('🚀 Sistema de agendamentos carregado!');
console.log(`📋 Cliente ID: ${CLIENTE_ID}`);
</script>
</body>
</html>
